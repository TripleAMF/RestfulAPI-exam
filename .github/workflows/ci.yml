name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MovieCatalogTests.sln

      - name: Build solution
        run: dotnet build MovieCatalogTests/MovieCatalogTests.sln --no-restore

      - name: Run tests
        run: dotnet test MovieCatalogTests/MovieCatalogTests.sln --no-build --verbosity normal
